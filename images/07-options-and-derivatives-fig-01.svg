<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="420" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">One-step binomial tree and the replicating portfolio</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">A long call equals 0.5 shares plus borrowing $38.10 — same payoffs in both states. No probability appears.</text>
<rect x="56" y="80" width="296" height="300" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="72" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" letter-spacing="1.2">CALL OPTION TREE</text>
<circle cx="120" cy="220" r="20" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="120" y="217" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">$100</text>
<text x="120" y="232" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">today</text>
<circle cx="280" cy="160" r="20" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="280" y="157" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">$120</text>
<text x="280" y="172" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">call: $20</text>
<circle cx="280" cy="280" r="20" fill="#fdfcfb" stroke="#1a1714" stroke-width="1"/>
<text x="280" y="277" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714" text-anchor="middle">$80</text>
<text x="280" y="292" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="#4a4540" text-anchor="middle">call: $0</text>
<path d="M140 210 L260 168" stroke="#1a1714" stroke-width="1.5" fill="none"/>
<path d="M140 230 L260 272" stroke="#1a1714" stroke-width="1.5" fill="none"/>
<text x="200" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">up state</text>
<text x="200" y="262" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">down state</text>
<rect x="404" y="80" width="252" height="300" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="420" y="104" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="bold" fill="#4a4540" letter-spacing="1.2">REPLICATING PORTFOLIO</text>
<text x="420" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">$\Delta = 0.5$ shares</text>
<text x="420" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">$B = -\$38.10$ (borrow)</text>
<line x1="420" y1="180" x2="640" y2="180" stroke="#c8c4c0" stroke-width="0.75" stroke-dasharray="3 3"/>
<text x="420" y="206" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">In up state:</text>
<text x="420" y="222" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">$0.5 \times 120 - 38.10 \times 1.05 = 20$</text>
<text x="420" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">In down state:</text>
<text x="420" y="264" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#1a1714">$0.5 \times 80 - 38.10 \times 1.05 = 0$</text>
<line x1="420" y1="288" x2="640" y2="288" stroke="#1a1714" stroke-width="1"/>
<text x="420" y="312" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">Cost today:</text>
<text x="420" y="332" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">$0.5 \times 100 - 38.10 = \$11.90$</text>
<text x="350.0" y="404" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">No probability of up vs. down appears in the calculation. The price comes from the replicating portfolio, not the forecast.</text>
</svg>