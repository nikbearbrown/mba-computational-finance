<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0, 8 3, 0 6" fill="#1a1714"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="480" fill="#fdfcfb"/>
<text x="350.0" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714" text-anchor="middle">The five layers of an integrated investment decision</text>
<text x="350.0" y="54" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">Errors compound upward — a mistake in Layer 1 propagates through every layer above it.</text>
<rect x="120" y="92" width="460" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="140" y="114" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1.5">LAYER 5</text>
<text x="140" y="134" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">Capital allocation</text>
<text x="350" y="134" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">y* — fraction of wealth at risk</text>
<rect x="120" y="168" width="460" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="140" y="190" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1.5">LAYER 4</text>
<text x="140" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">Portfolio fit</text>
<text x="350" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">Where does this position sit on the frontier?</text>
<rect x="120" y="244" width="460" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="140" y="266" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1.5">LAYER 3</text>
<text x="140" y="286" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">Valuation</text>
<text x="350" y="286" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">DCF / option overlay / leverage decision</text>
<rect x="120" y="320" width="460" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="140" y="342" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1.5">LAYER 2</text>
<text x="140" y="362" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">Asset pricing read</text>
<text x="350" y="362" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">CAPM / factor decomposition — alpha or beta?</text>
<rect x="120" y="396" width="460" height="60" fill="#f5f2ee" stroke="#1a1714" stroke-width="1"/>
<text x="140" y="418" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#4a4540" letter-spacing="1.5">LAYER 1</text>
<text x="140" y="438" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-weight="bold" fill="#1a1714">Return measurement</text>
<text x="350" y="438" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540">Returns, volatility, Sharpe with conventions stated</text>
<path d="M350 164 L350 148" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M350 240 L350 224" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M350 316 L350 300" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<path d="M350 392 L350 376" stroke="#1a1714" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<text x="350.0" y="468" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-style="italic" fill="#4a4540" text-anchor="middle">The capstone holds all five layers at once — a recommendation that survives Q&amp;A is one that defends each layer separately.</text>
</svg>